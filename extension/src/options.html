<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News — Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>AI News — Settings</h1>

      <label class="field">
        <span>Backend URL</span>
        <input id="backendUrl" type="url" placeholder="http://localhost:8787" />
        <small>The aggregator service. Default: <code>http://localhost:8787</code></small>
      </label>

      <label class="field">
        <span>Default summary language</span>
        <select id="defaultLang">
          <option value="zh">中文 (Chinese)</option>
          <option value="en">English</option>
        </select>
      </label>

      <label class="field">
        <span>Background refresh (minutes)</span>
        <input id="refreshMinutes" type="number" min="5" max="1440" step="5" />
        <small>Minimum 5 minutes.</small>
      </label>

      <fieldset class="field">
        <legend>Enabled providers</legend>
        <label><input type="checkbox" value="copilot" class="prov" /> GitHub Copilot</label>
        <label><input type="checkbox" value="claude" class="prov" /> Claude (Anthropic)</label>
        <label><input type="checkbox" value="cursor" class="prov" /> Cursor</label>
        <label><input type="checkbox" value="codex" class="prov" /> Codex / OpenAI</label>
      </fieldset>

      <div class="actions">
        <button id="save">Save</button>
        <button id="test">Test connection</button>
        <span id="status"></span>
      </div>
    </main>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
